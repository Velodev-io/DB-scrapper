git:
  auto_commit_on_pass: false
  auto_push_on_pass: false
  default_commit_message: "verify: auto-commit verified changes"

monorepo:
  type: "npm-workspaces"
  package_manager: "npm"
  apps:
    - "apps/api"
    - "apps/agent"
    - "apps/admin"
  packages:
    - "packages/shared"

commands:
  # Root commands for monorepo tasks
  build: "npm run build"
  typecheck: "npm run build && npm run build -w apps/api"
  lint: "npx tsc -b" # TS check since there's no eslint configured
  security_audit: "npm audit"

database:
  provider: "prisma"
  schema_path: "apps/api/prisma/schema.prisma"
